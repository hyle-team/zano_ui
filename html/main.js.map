<h4 mat-dialog-title>
    {{ 'DEEPLINK.LABELS.LABEL1' | translate }}
</h4>

<mat-dialog-content>
    <div class="form__field">
        <label for="walletId">{{ 'DEEPLINK.LABELS.LABEL1' | translate }}</label>
        <ng-select
            [formControl]="walletIdControl"
            [clearable]="false"
            [items]="availableWallets"
            [searchable]="false"
            appendTo="body"
            autofocus="true"
            bindLabel="name"
            bindValue="wallet_id"
            id="walletId"
            aria-describedby="'walletId-error1 walletId-error2'"
        >
        </ng-select>
        <ng-container *ngIf="walletIdControl | isVisibleControlError">
            <div *ngIf="walletIdControl.hasError('required')" class="error" aria-live="assertive" id="walletId-error1">
                {{ 'ERRORS.REQUIRED' | translate }}
            </div>
            <div
                (contextmenu)="variablesService.onContextMenuOnlyCopy($event, deeplinkResponse.asset_id)"
                *ngIf="walletIdControl.hasError('walletHasNoAsset')"
                class="error"
                aria-live="assertive"
                id="walletId-error2"
            >
                {{ 'DEEPLINK.LABELS.LABEL14' | translate : { assetId: deeplinkResponse.asset_id } }}
            </div>
        </ng-container>
    </div>
</mat-dialog-content>

<mat-dialog-actions class="controls">
    <button class="outline big mr-1" mat-dialog-close type="button">
        {{ 'EXPORT_HISTORY.CANCEL' | translate }}
    </button>
    <button (click)="submit()" [disabled]="walletIdControl.invalid" class="primary big ml-1" type="button">
        {{ 'DEEPLINK.BUTTONS.BUTTON1' | translate }}
    </button>
</mat-dialog-actions>
